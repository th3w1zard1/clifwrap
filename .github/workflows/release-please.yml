name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - id: release
        uses: googleapis/release-please-action@v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
      - name: Dispatch release PR validation
        if: ${{ !steps.release.outputs.release_created }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_BRANCH: release-please--branches--main--components--clifwrap
        run: |
          head_sha="$(gh pr list --repo "$GITHUB_REPOSITORY" --head "$RELEASE_BRANCH" --json headRefOid --jq '.[0].headRefOid // ""')"
          if [ -n "$head_sha" ]; then
            gh workflow run release-pr-validation.yml --repo "$GITHUB_REPOSITORY" --ref "$RELEASE_BRANCH" -f ref="$head_sha" ||
              gh workflow run release-pr-validation.yml --repo "$GITHUB_REPOSITORY" --ref main -f ref="$head_sha"
          fi
      - name: Gate created release through validation
        if: ${{ steps.release.outputs.release_created }}
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag_name }}
        run: |
          gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --prerelease=true
          gh workflow run release.yml --repo "$GITHUB_REPOSITORY" --ref main -f tag="$TAG"
