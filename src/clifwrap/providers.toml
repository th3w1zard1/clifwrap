[providers.tvly]
interactive_mode = "line-repl"
retry_exit_codes = [3]
retry_patterns = [
  "usage limit",
  "upgrade your plan",
  "rate limit",
  "too many requests",
  "429",
  "432",
  "not authenticated",
  "no tavily api key found",
  "authentication timed out",
]
never_retry_patterns = [
  "got unexpected extra argument",
  "missing argument",
  "no such command",
  "invalid value",
  "parse error",
]

[providers.tvly.auth_management]
command = "auth"
aliases = ["accounts", "logins", "credentials"]

[providers.tvly.fallback_monitor]
threshold = 3
action = "warn"
journald = true
syslog = true
stderr = true

[providers.tvly.usage]
url = "https://api.tavily.com/usage"
auth_env = "TAVILY_API_KEY"
timeout_seconds = 15
auth_header = "Authorization"
auth_scheme = "Bearer"
used_path = "key.usage"
limit_path = "key.limit"
fallback_used_path = "account.plan_usage"
fallback_limit_path = "account.plan_limit"
label = "key"
fallback_label = "plan"

[providers.tvly.capacity_control]
default_action = "queue"
unknown_capacity_action = "allow"
# Tavily bills ~1 credit/basic search and ~2/advanced. Keep a small soft reserve so
# near-empty keys are deprioritized, but do not inflate search to crawl-scale costs.
reserve_threshold = 5
default_cost = 1
queue_retention_seconds = 86400
queue_max_items = 100
snapshot_ttl_seconds = 60
command_costs = { search = 1, extract = 1, map = 1, crawl = 5, research = 15 }
remediation_message = "Provision another Tavily key or enable another configured account before replaying queued work."
remediation_commands = [
  "clifwrap account list tvly",
  "clifwrap account add tvly <name> --env-ref TAVILY_API_KEY=ENVVAR",
]

[providers.firecrawl]
passthrough_commands = ["login", "logout"]
retry_patterns = [
  "rate limit",
  "too many requests",
  "quota",
  "remaining credits",
  "insufficient credits",
  "api key is required",
  "not authenticated",
  "unauthorized",
  "forbidden",
]
never_retry_patterns = [
  "unknown option",
  "missing required argument",
  "invalid status",
]

[providers.firecrawl.auth_management]
command = "login"
aliases = ["accounts"]

[providers.firecrawl.fallback_monitor]
threshold = 3
action = "warn"
journald = true
syslog = true
stderr = true

[providers.firecrawl.usage]
url = "{FIRECRAWL_API_URL:https://api.firecrawl.dev}/v2/team/credit-usage"
auth_env = "FIRECRAWL_API_KEY"
timeout_seconds = 15
auth_header = "Authorization"
auth_scheme = "Bearer"
content_type = "application/json"
remaining_path = "data.remainingCredits"
limit_path = "data.planCredits"
label = "credits"

[providers.firecrawl.capacity_control]
default_action = "queue"
unknown_capacity_action = "allow"
# Firecrawl search is ~2 credits; scrape is typically 1+. Soft reserve only.
reserve_threshold = 5
default_cost = 1
queue_retention_seconds = 86400
queue_max_items = 100
snapshot_ttl_seconds = 60
command_costs = { scrape = 1, map = 2, search = 2, crawl = 10, extract = 5 }
remediation_message = "Provision additional Firecrawl credits or enable another configured account before replaying queued work."
remediation_commands = [
  "clifwrap account list firecrawl",
  "clifwrap account add firecrawl <name> --env-ref FIRECRAWL_API_KEY=ENVVAR",
]
